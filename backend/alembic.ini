# Alembic config. Run migrations from sound-lab-backend/:
#   python -m alembic upgrade head
#   python -m alembic revision --autogenerate -m "message"

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./sound_lab.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
